<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0a1f"/>
      <stop offset="100%" stop-color="#060410"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe8"/>
      <stop offset="60%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00eeff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00eeff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#cc00ff"/>
    </linearGradient>
    <linearGradient id="petal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </linearGradient>
    <filter id="bloom">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="12" cy="18" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="108" cy="14" r="0.6" fill="#aad4ff" opacity="0.8"/>
  <circle cx="22" cy="105" r="0.7" fill="#ffffff" opacity="0.6"/>
  <circle cx="115" cy="98" r="0.9" fill="#ffccee" opacity="0.7"/>
  <circle cx="98" cy="22" r="0.5" fill="#ccffee" opacity="0.8"/>
  <circle cx="18" cy="60" r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="110" cy="55" r="0.7" fill="#aad4ff" opacity="0.6"/>
  <circle cx="55" cy="10" r="0.6" fill="#ffffff" opacity="0.7"/>
  <circle cx="72" cy="118" r="0.5" fill="#ffccee" opacity="0.6"/>
  <circle cx="8" cy="80" r="0.4" fill="#ccffee" opacity="0.7"/>
  <circle cx="120" cy="72" r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="35" cy="16" r="0.5" fill="#aad4ff" opacity="0.6"/>
  <circle cx="90" cy="112" r="0.6" fill="#ffffff" opacity="0.7"/>
  <circle cx="6" cy="40" r="0.4" fill="#ffccee" opacity="0.5"/>
  <circle cx="122" cy="38" r="0.5" fill="#ccffee" opacity="0.6"/>

  <!-- Ambient glow behind flower -->
  <circle cx="64" cy="64" r="36" fill="url(#glow)" filter="url(#softglow)"/>

  <!-- Petals (6 petals, evenly spaced at 60deg intervals) -->
  <!-- Each petal is an ellipse rotated around center -->
  <g transform="translate(64,64)" filter="url(#bloom)">
    <!-- Petal 0: 0deg (up) -->
    <ellipse cx="0" cy="-22" rx="8" ry="16" fill="url(#petal1)" opacity="0.88" transform="rotate(0)"/>
    <!-- Petal 1: 60deg -->
    <ellipse cx="0" cy="-22" rx="8" ry="16" fill="url(#petal2)" opacity="0.82" transform="rotate(60)"/>
    <!-- Petal 2: 120deg -->
    <ellipse cx="0" cy="-22" rx="8" ry="16" fill="url(#petal1)" opacity="0.85" transform="rotate(120)"/>
    <!-- Petal 3: 180deg -->
    <ellipse cx="0" cy="-22" rx="8" ry="16" fill="url(#petal2)" opacity="0.88" transform="rotate(180)"/>
    <!-- Petal 4: 240deg -->
    <ellipse cx="0" cy="-22" rx="8" ry="16" fill="url(#petal1)" opacity="0.82" transform="rotate(240)"/>
    <!-- Petal 5: 300deg -->
    <ellipse cx="0" cy="-22" rx="8" ry="16" fill="url(#petal2)" opacity="0.85" transform="rotate(300)"/>
  </g>

  <!-- Flower center glow -->
  <circle cx="64" cy="64" r="12" fill="url(#core)" filter="url(#bloom)"/>
  <circle cx="64" cy="64" r="7" fill="#fffbe8" opacity="0.95"/>

  <!-- Inner ring detail -->
  <circle cx="64" cy="64" r="9" fill="none" stroke="#00eeff" stroke-width="0.8" opacity="0.5"/>
</svg>
